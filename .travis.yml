language: node_js
node_js:
  - "12"

install:
  - npm ci

cache:
  directories:
    - "$HOME/.npm"

stages:
  - name: test
    if: type = pull_request AND branch = development
  - name: deploy
    if: type = push AND branch = development

jobs:
  include:
    - stage: test
      script:
        - npx eslint ./src
        - npm run build
    - stage: deploy
      script:
        - npm run predeploy
        - npm run deploy
